<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de contenido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="supabase-config.js"></script>
    <script defer src="admin.js"></script>
  </head>
  <body class="admin-body manager-page">
    <header class="site-header manager-header">
      <a class="brand" href="#perfil" aria-label="Inicio del gestor">
        <span class="brand-mark"></span>
        <span>Gestor</span>
      </a>
      <nav class="nav-links" aria-label="Navegacion del gestor">
        <a href="#perfil">Perfil</a>
        <a href="#intereses">Intereses</a>
        <a href="#fotos">Fotos</a>
      </nav>
    </header>

    <main class="admin-shell manager-shell">
      <section class="manager-hero">
        <div>
          <p class="eyebrow">Panel personal</p>
          <h1>Gestiona tu perfil y tu galeria.</h1>
          <p id="storage-status">Cargando modo de almacenamiento...</p>
        </div>
        <button class="button ghost" type="button" id="logout-button" hidden>Cerrar sesion</button>
      </section>

      <section class="editor-section auth-section" id="auth-panel" hidden>
        <div class="section-heading compact">
          <p class="eyebrow">Acceso</p>
          <h2>Inicia sesion para editar</h2>
        </div>
        <form class="editor-form" id="login-form">
          <label>
            Correo
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Contrasena
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">Entrar</button>
          </div>
        </form>
      </section>

      <div id="admin-content" hidden>
        <section class="manager-panel profile-panel" id="perfil">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Perfil publico</p>
              <h2>Informacion principal</h2>
            </div>
            <div class="panel-actions">
              <button class="button ghost" type="button" id="edit-profile">Editar</button>
              <button class="button danger" type="button" id="delete-profile">Eliminar</button>
            </div>
          </div>

          <article class="profile-summary" id="profile-summary"></article>

          <form class="editor-form elevated-form" id="profile-form" hidden>
            <input name="avatar_url" type="hidden" />
            <label>
              Nombre o titulo
              <input name="name" type="text" required />
            </label>
            <label>
              Frase principal
              <input name="headline" type="text" />
            </label>
            <label>
              Ubicacion
              <input name="location" type="text" />
            </label>
            <label>
              Foto de perfil
              <input name="avatar_file" type="file" accept="image/*" />
            </label>
            <label>
              Sobre mi
              <textarea name="about" rows="5"></textarea>
            </label>
            <label>
              Objetivo o enfoque
              <textarea name="focus" rows="4"></textarea>
            </label>
            <div class="image-preview" id="profile-preview" hidden></div>
            <div class="form-actions">
              <button class="button primary" type="submit">Guardar perfil</button>
              <button class="button ghost" type="button" id="cancel-profile">Cancelar</button>
            </div>
          </form>
        </section>

        <section class="manager-panel" id="intereses">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Intereses</p>
              <h2>Secciones publicadas</h2>
            </div>
            <button class="button primary" type="button" id="new-highlight">Nuevo interes</button>
          </div>

          <form class="editor-form elevated-form" id="highlight-form" hidden>
            <input type="hidden" name="id" />
            <label>
              Titulo
              <input name="title" type="text" required />
            </label>
            <label>
              Orden
              <input name="sort_order" type="number" value="0" />
            </label>
            <label>
              Descripcion
              <textarea name="description" rows="3" required></textarea>
            </label>
            <div class="form-actions">
              <button class="button primary" type="submit">Guardar interes</button>
              <button class="button ghost" type="button" id="cancel-highlight">Cancelar</button>
            </div>
          </form>

          <div class="manager-grid" id="highlight-list"></div>
        </section>

        <section class="manager-panel" id="fotos">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Galeria</p>
              <h2>Fotografias subidas</h2>
            </div>
            <button class="button primary" type="button" id="new-photo">Nueva foto</button>
          </div>

          <form class="editor-form elevated-form" id="photo-form" hidden>
            <input type="hidden" name="id" />
            <input type="hidden" name="image_url" />
            <label>
              Titulo de la foto
              <input name="title" type="text" required />
            </label>
            <label>
              Lugar o contexto
              <input name="location" type="text" />
            </label>
            <label>
              Orden
              <input name="sort_order" type="number" value="0" />
            </label>
            <label>
              Archivo de imagen
              <input name="image_file" type="file" accept="image/*" />
            </label>
            <label>
              URL externa opcional
              <input name="external_url" type="url" placeholder="https://..." />
            </label>
            <label>
              Descripcion
              <textarea name="description" rows="3" required></textarea>
            </label>
            <div class="image-preview" id="photo-preview" hidden></div>
            <div class="form-actions">
              <button class="button primary" type="submit">Guardar foto</button>
              <button class="button ghost" type="button" id="cancel-photo">Cancelar</button>
            </div>
          </form>

          <div class="manager-grid photo-grid" id="photo-list"></div>
        </section>
      </div>

      <div class="toast" id="toast" hidden></div>
    </main>
  </body>
</html>
