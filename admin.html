<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de contenido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="supabase-config.js"></script>
    <script defer src="admin.js"></script>
  </head>
  <body class="admin-body">
    <header class="site-header">
      <a class="brand" href="#perfil" aria-label="Inicio del gestor">
        <span class="brand-mark"></span>
        <span>Gestor</span>
      </a>
      <nav class="nav-links" aria-label="Navegacion del gestor">
        <a href="#perfil">Perfil</a>
        <a href="#fotos">Fotos</a>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-hero">
        <p class="eyebrow">Panel personal</p>
        <h1>Gestiona tu informacion y tus fotografias.</h1>
        <p id="storage-status">Cargando modo de almacenamiento...</p>
      </section>

      <section class="editor-section auth-section" id="auth-panel" hidden>
        <div class="section-heading compact">
          <p class="eyebrow">Acceso</p>
          <h2>Inicia sesion para editar en Supabase</h2>
        </div>
        <form class="editor-form" id="login-form">
          <label>
            Correo
            <input name="email" type="email" required />
          </label>
          <label>
            Contrasena
            <input name="password" type="password" required />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">Entrar</button>
          </div>
        </form>
      </section>

      <div id="admin-content">
      <section class="editor-section" id="perfil">
        <div class="section-heading compact">
          <p class="eyebrow">Perfil publico</p>
          <h2>Informacion principal</h2>
        </div>
        <form class="editor-form" id="profile-form">
          <label>
            Nombre o titulo
            <input name="name" type="text" required />
          </label>
          <label>
            Frase principal
            <input name="headline" type="text" />
          </label>
          <label>
            Ubicacion
            <input name="location" type="text" />
          </label>
          <label>
            URL de foto personal
            <input name="avatar_url" type="url" placeholder="https://..." />
          </label>
          <label>
            Sobre mi
            <textarea name="about" rows="5"></textarea>
          </label>
          <label>
            Objetivo o enfoque
            <textarea name="focus" rows="4"></textarea>
          </label>
          <button class="button primary" type="submit">Guardar perfil</button>
        </form>
      </section>

      <section class="editor-section">
        <div class="section-heading compact">
          <p class="eyebrow">Intereses</p>
          <h2>Crear o editar secciones</h2>
        </div>
        <form class="editor-form inline-editor" id="highlight-form">
          <input type="hidden" name="id" />
          <label>
            Titulo
            <input name="title" type="text" required />
          </label>
          <label>
            Descripcion
            <textarea name="description" rows="3" required></textarea>
          </label>
          <label>
            Orden
            <input name="sort_order" type="number" value="0" />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">Guardar interes</button>
            <button class="button ghost" type="button" id="clear-highlight">Limpiar</button>
          </div>
        </form>
        <div class="manager-list" id="highlight-list"></div>
      </section>

      <section class="editor-section" id="fotos">
        <div class="section-heading compact">
          <p class="eyebrow">Galeria</p>
          <h2>Subir y describir fotografias</h2>
        </div>
        <form class="editor-form inline-editor" id="photo-form">
          <input type="hidden" name="id" />
          <label>
            Titulo de la foto
            <input name="title" type="text" required />
          </label>
          <label>
            Descripcion
            <textarea name="description" rows="3" required></textarea>
          </label>
          <label>
            Lugar o contexto
            <input name="location" type="text" />
          </label>
          <label>
            Orden
            <input name="sort_order" type="number" value="0" />
          </label>
          <label>
            URL de imagen
            <input name="image_url" type="url" placeholder="https://..." />
          </label>
          <label>
            Archivo de imagen
            <input name="image_file" type="file" accept="image/*" />
          </label>
          <div class="form-actions">
            <button class="button primary" type="submit">Guardar foto</button>
            <button class="button ghost" type="button" id="clear-photo">Limpiar</button>
          </div>
        </form>
        <div class="manager-list photo-list" id="photo-list"></div>
      </section>
      </div>
    </main>
  </body>
</html>
